name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "src-tauri/tauri.conf.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, e.g. v0.1.0"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      should_release: ${{ steps.meta.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.release_tag }}" ]; then
              RELEASE_TAG="${{ inputs.release_tag }}"
            else
              RELEASE_TAG="v$(node -p "require('./package.json').version")"
            fi
          else
            RELEASE_TAG="v$(node -p "require('./package.json').version")"
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match src-tauri/tauri.conf.json version ($TAURI_VERSION)" >&2
            exit 1
          fi

          git fetch --tags --force

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag
        if: steps.meta.outputs.should_release == 'true'
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$RELEASE_TAG"

      - name: Create or reuse GitHub release
        if: steps.meta.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "GraphViz $RELEASE_TAG" \
              --notes "Automated release for Windows, macOS, Linux, and Android." \
              --draft
          fi

  desktop:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            bundles: dmg
          - runner: ubuntu-24.04
            bundles: appimage
          - runner: windows-latest
            bundles: nsis

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget \
            xdg-utils

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate project
        run: bun run check

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.release_tag }}
          releaseName: GraphViz ${{ needs.prepare-release.outputs.release_tag }}
          releaseBody: |
            Cross-platform release for Windows, macOS, Linux, and Android.

            Tag: ${{ needs.prepare-release.outputs.release_tag }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          assetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: --bundles ${{ matrix.bundles }}
          tauriScript: bun run tauri

  android:
    needs:
      - prepare-release
      - desktop
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Export Android environment
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate project
        run: bun run check:web

      - name: Initialize Android target
        run: bun run tauri:android:init

      - name: Apply Android app icons
        shell: bash
        run: |
          mkdir -p src-tauri/gen/android/app/src/main/res
          cp -R src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      - name: Validate Android signing secrets
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        shell: bash
        run: |
          for name in ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_BASE64; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              exit 1
            fi
          done

      - name: Setup Android signing
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        shell: bash
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> keystore.properties
          echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> keystore.properties
          base64 -d <<< "$ANDROID_KEY_BASE64" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Configure Android release signing
        shell: bash
        run: |
          BUILD_FILE="src-tauri/gen/android/app/build.gradle.kts"

          if ! grep -q '^import java.io.FileInputStream$' "$BUILD_FILE"; then
            perl -0pi -e 's/\A/import java.io.FileInputStream\n/' "$BUILD_FILE"
          fi

          if ! grep -q '^import java.util.Properties$' "$BUILD_FILE"; then
            perl -0pi -e 's/\A/import java.util.Properties\n/' "$BUILD_FILE"
          fi

          if ! grep -q 'signingConfigs.getByName("release")' "$BUILD_FILE"; then
            perl -0pi -e 's/\n(\s*)buildTypes \{/\n$1signingConfigs {\n$1    create("release") {\n$1        val keystorePropertiesFile = rootProject.file("keystore.properties")\n$1        val keystoreProperties = Properties()\n$1        if (keystorePropertiesFile.exists()) {\n$1            keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n$1        }\n\n$1        keyAlias = keystoreProperties["keyAlias"] as String\n$1        keyPassword = keystoreProperties["keyPassword"] as String\n$1        storeFile = file(keystoreProperties["storeFile"] as String)\n$1        storePassword = keystoreProperties["storePassword"] as String\n$1    }\n$1}\n\n$1buildTypes {/s' "$BUILD_FILE"
            perl -0pi -e 's/getByName\("release"\) \{(.*?)\n(\s*)\}/getByName("release") {\1\n$2    signingConfig = signingConfigs.getByName("release")\n$2}/s' "$BUILD_FILE"
          fi

      - name: Build Android bundles
        run: bun run tauri:android:build

      - name: Upload Android release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        shell: bash
        run: |
          mkdir -p release-assets/android
          while IFS= read -r source; do
            filename="$(basename "$source")"
            cp "$source" "release-assets/android/GraphViz_${RELEASE_TAG#v}_android_${filename}"
          done < <(
            find src-tauri/gen/android/app/build/outputs \
              -name "*.apk" \
              ! -name "*-unsigned.apk" \
              -type f | sort
          )
          test -n "$(find release-assets/android -type f -name '*.apk' -print -quit)"
          gh release upload "$RELEASE_TAG" release-assets/android/* --clobber

  publish-release:
    needs:
      - prepare-release
      - desktop
      - android
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        shell: bash
        run: |
          gh release edit "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest \
            --title "GraphViz $RELEASE_TAG" \
            --notes "Automated release for Windows, macOS, Linux, and Android."
