name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or reuse GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "GraphViz $RELEASE_TAG" \
              --notes "Automated multi-platform release for $RELEASE_TAG" \
              --draft
          fi

  desktop:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
          - runner: ubuntu-24.04
          - runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget \
            xdg-utils

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate project
        run: bun run check

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.release_tag }}
          releaseName: GraphViz ${{ needs.prepare-release.outputs.release_tag }}
          releaseBody: Desktop bundles for ${{ needs.prepare-release.outputs.release_tag }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          tauriScript: bun run tauri

  android:
    needs:
      - prepare-release
      - desktop
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Export Android environment
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate project
        run: bun run check

      - name: Initialize Android target
        run: bun run tauri:android:init

      - name: Build Android bundles
        run: bun run tauri:android:build

      - name: Upload Android release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        shell: bash
        run: |
          mkdir -p release-assets/android
          find src-tauri/gen/android/app/build/outputs \
            \( -name "*.apk" -o -name "*.aab" \) \
            -type f \
            -exec cp {} release-assets/android/ \;
          gh release upload "$RELEASE_TAG" release-assets/android/* --clobber
